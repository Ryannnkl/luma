name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  release:
    name: Linux x86_64 release
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends --yes \
            libpam0g-dev \
            libxkbcommon-dev \
            pkg-config

      - name: Install stable Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add x86_64-unknown-linux-gnu

      - name: Build release binary
        run: cargo build --locked --release --target x86_64-unknown-linux-gnu

      - name: Prepare release assets
        run: |
          install -Dm755 \
            target/x86_64-unknown-linux-gnu/release/luma \
            dist/luma-x86_64-unknown-linux-gnu
          install -Dm644 pam/luma dist/luma.pam
          cd dist
          sha256sum luma-x86_64-unknown-linux-gnu luma.pam > SHA256SUMS

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist/luma-x86_64-unknown-linux-gnu \
            dist/luma.pam \
            dist/SHA256SUMS \
            --repo "${GITHUB_REPOSITORY}" \
            --verify-tag \
            --generate-notes \
            --title "Luma ${GITHUB_REF_NAME}"
