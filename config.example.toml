# Copy this file to ~/.config/luma/config.toml.
# Positions use normalized screen coordinates: 0.0 is left/top and 1.0 is right/bottom.
# Colors accept #RRGGBB or #RRGGBBAA.

[background]
capture_enabled = false
blur_radius = 24
dim_color = "#00000052"

[clock]
enabled = true
x = 0.50
y = 0.46
size_ratio = 0.22
min_size = 96.0
max_size = 184.0
line_gap_ratio = 0.68
hour_offset_x_ratio = -0.10
minute_offset_x_ratio = 0.16
hour_format = "%H"
minute_format = "%M"
# Optional absolute paths to TTF or OTF files. Omit them to use the embedded font.
# hour_font_path = "/usr/share/fonts/example/Example-Bold.ttf"
# minute_font_path = "/usr/share/fonts/example/Example-Bold.ttf"
hour_color = "#93e6be"
minute_color = "#f6f8f7"

[date]
enabled = false
x = 0.50
y = 0.72
format = "%A, %d %B"
# font_path = "/usr/share/fonts/example/Example-Regular.ttf"
size = 22.0
color = "#f6f8f7dc"

[input]
# The real lock always keeps its authentication prompt visible for safety.
enabled = true
x = 0.50
y = 0.925
width = 156.0
height = 34.0
corner_radius = 17.0
border_width = 0.0
border_color = "#ffffff30"
max_characters = 12
min_dots = 6
dot_spacing = 10.0
empty_dot_radius = 2.1
filled_dot_radius = 2.7
background_color = "#0000009b"
empty_dot_color = "#ffffff3e"
filled_dot_color = "#ecf4f0"
feedback_background_color = "#265c48d2"
feedback_accent_color = "#bef4d8"
error_color = "#ff8a80"
feedback_duration_ms = 2000
